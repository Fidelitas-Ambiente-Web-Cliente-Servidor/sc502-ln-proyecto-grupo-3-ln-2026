<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publicar Viaje - Carpooling</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <header class="bg-dark text-white text-center py-4">
      <h1>RideShare</h1>
      <p>Comparte tu ruta, ahorra dinero y ayuda al medio ambiente</p>
    </header>

    <main class="container my-5 flex-grow">
      <!-- Filtro de viajes disponibles -->

      <div class="wrapper">
        <section id="filter">
          <form id="filterForm" class="filter">
            <div>
              <label for="zone" class="form-label">Zona de destino</label>
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"
                  ><i class="bi bi-geo-alt"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Ej: Heredia, San Pedro..."
                  id="zone"
                />
              </div>
            </div>
          </form>
        </section>

        <section class="btnWrapper">
          <a
            href="../CrearViaje/index.html"
            class="btn-ride primary"
            id="btnPublicar"
          >
            Publicar ride
          </a>
          <button type="submit" class="btn-ride secondary" id="btnPublicar">
            Mis rides
          </button>
        </section>
      </div>

      <!-- Contenedor para mostrar los viajes disponibles -->

      <section id="trips">
        <h2>Busca tu Ride</h2>
        <div class="trip-cards"></div>
      </section>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <p>&copy; 2026 Carpooling App - Todos los derechos reservados</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./home.js"></script>
  </body>
</html>
