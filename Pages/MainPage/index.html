<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="./mainPage.css" />
  </head>
  <body>
    <header
      class="text-dark text-left py-3 px-3 d-flex flex-row justify-content-between"
    >
      <h1>RideShare</h1>
      <a class="btn-ride primary" id="btnSearch" href="../Ingreso/index.html">
        Ingresar
      </a>
    </header>
    <main class="mainWrapper">
      <div
        id="carouselExampleSlidesOnly"
        class="carousel slide carousel-fade"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="../../img/company-young-guys-welcoming-each-other-car.jpg"
              class="d-block w-100"
              alt="Amigos en auto"
            />
          </div>
          <div class="carousel-item">
            <img
              src="../../img/friends-having-fun-inside-car.jpg"
              class="d-block w-100"
              alt="Amigos divirtiéndose"
            />
          </div>
          <div class="carousel-item">
            <img
              src="../../img/man-driving-looking-girlfriend-s-tablet.jpg"
              class="d-block w-100"
              alt="Pareja en auto"
            />
          </div>
          <div class="carousel-item">
            <img
              src="../../img/young-uber-driver-car-interior.jpg"
              class="d-block w-100"
              alt="Conductor joven"
            />
          </div>
        </div>
      </div>

      <form id="filterForm" class="filter-container">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
          <input
            type="text"
            class="form-control"
            placeholder="¿Dónde vas?"
            id="zone"
          />
        </div>
        <a
          class="btn-ride primary search-btn"
          id="btnSearchSubmit"
          href="../Home/index.html"
        >
          <i class="bi bi-search"></i>
        </a>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./mainPage.js"></script>
  </body>
</html>
